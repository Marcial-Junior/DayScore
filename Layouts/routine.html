<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DayScore – Routine Reference</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #e8e8f2; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 24px 12px 48px; display: flex; flex-direction: column; align-items: center; }
  .label { font-size: 11px; color: #888; margin-bottom: 8px; font-weight: 500; }
  .phone { background: #f2f2f8; border-radius: 28px; width: 220px; overflow: hidden; box-shadow: 0 10px 32px rgba(0,0,0,0.10); }
  .screen { padding: 16px 12px 8px; display: flex; flex-direction: column; gap: 8px; min-height: 460px; }
  .tab-bar { display: flex; justify-content: space-around; border-top: 0.5px solid #e0e0e0; padding: 7px 0 10px; background: white; }
  .tab { display: flex; flex-direction: column; align-items: center; gap: 1px; font-size: 8px; color: #bbb; }
  .tab.active { color: #534AB7; font-weight: 600; }
  .tab-icon { font-size: 13px; }
  .pg-title { font-size: 15px; font-weight: 700; color: #1a1a2e; }
  .pg-sub { font-size: 10px; color: #aaa; margin-top: 1px; }
  .habit-card { background: white; border-radius: 12px; padding: 10px 11px; display: flex; align-items: center; gap: 10px; }
  .habit-icon { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .habit-body { flex: 1; min-width: 0; }
  .habit-name { font-size: 12px; font-weight: 600; color: #1a1a2e; margin-bottom: 5px; }
  .habit-prog-bar { height: 3px; background: #f0f0f0; border-radius: 2px; overflow: hidden; margin-bottom: 5px; }
  .habit-prog-fill { height: 100%; border-radius: 2px; }
  .habit-bottom { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .hdays { display: flex; gap: 3px; }
  .hd { width: 16px; height: 16px; border-radius: 50%; font-size: 7px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
  .hd.done { background: #1D9E75; color: white; }
  .hd.today { background: #534AB7; color: white; }
  .hd.empty { background: #f0f0f0; color: #ccc; }
  .habit-streak-tag { font-size: 9px; color: #f4a261; font-weight: 600; white-space: nowrap; }
  .habit-check { width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; }
  .habit-check.done { background: #1D9E75; color: white; }
  .habit-check.pending { border: 1.5px solid #e0e0e0; }
  .add-habit { background: white; border-radius: 12px; padding: 9px 11px; display: flex; align-items: center; gap: 7px; border: 1.5px dashed #e0e0e0; }
</style>
</head>
<body>
<p class="label">ROUTINE — Reference Mockup</p>
<div class="phone">
  <div class="screen">
    <div><div class="pg-title">Routine</div><div class="pg-sub">Daily habits to build consistency</div></div>
    <div class="habit-card">
      <div class="habit-icon" style="background:#fff8e6;">⏰</div>
      <div class="habit-body">
        <div class="habit-name">Acordar 06am</div>
        <div class="habit-prog-bar"><div class="habit-prog-fill" style="width:0%;background:#534AB7;"></div></div>
        <div class="habit-bottom">
          <div class="hdays"><div class="hd done">M</div><div class="hd done">T</div><div class="hd today">W</div><div class="hd empty">T</div><div class="hd empty">F</div></div>
          <span class="habit-streak-tag">🔥 2d</span>
        </div>
      </div>
      <div class="habit-check pending"></div>
    </div>
    <div class="habit-card">
      <div class="habit-icon" style="background:#e8f5ee;">🙏</div>
      <div class="habit-body">
        <div class="habit-name">Oração</div>
        <div class="habit-prog-bar"><div class="habit-prog-fill" style="width:60%;background:#1D9E75;"></div></div>
        <div class="habit-bottom">
          <div class="hdays"><div class="hd done">M</div><div class="hd done">T</div><div class="hd today">W</div><div class="hd empty">T</div><div class="hd empty">F</div></div>
          <span class="habit-streak-tag">🔥 5d</span>
        </div>
      </div>
      <div class="habit-check done">✓</div>
    </div>
    <div class="habit-card">
      <div class="habit-icon" style="background:#eeedfe;">🏃</div>
      <div class="habit-body">
        <div class="habit-name">Treino Mobilidade</div>
        <div class="habit-prog-bar"><div class="habit-prog-fill" style="width:40%;background:#EF9F27;"></div></div>
        <div class="habit-bottom">
          <div class="hdays"><div class="hd empty">M</div><div class="hd done">T</div><div class="hd today">W</div><div class="hd empty">T</div><div class="hd empty">F</div></div>
          <span class="habit-streak-tag">🔥 1d</span>
        </div>
      </div>
      <div class="habit-check done">✓</div>
    </div>
    <div class="add-habit">
      <span style="font-size:14px;">➕</span>
      <span style="font-size:11px;color:#ccc;">Add new habit...</span>
    </div>
  </div>
  <div class="tab-bar">
    <div class="tab"><span class="tab-icon">📋</span>Today</div>
    <div class="tab active"><span class="tab-icon">🔄</span>Routine</div>
    <div class="tab"><span class="tab-icon">📊</span>History</div>
    <div class="tab"><span class="tab-icon">🏆</span>Awards</div>
    <div class="tab"><span class="tab-icon">⚙️</span>Settings</div>
  </div>
</div>
</body>
</html>
